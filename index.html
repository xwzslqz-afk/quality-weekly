<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>质量管理周报</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}
.hd{background:linear-gradient(135deg,#1a365d,#2563eb);color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hd h1{font-size:18px}
.hd select,.hd input{font-size:12px;padding:4px 8px;border:1px solid #d1d5db;border-radius:5px;font-family:inherit}
.btn{padding:5px 10px;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit}
.bo{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:5px}
.bo:hover{background:rgba(255,255,255,.2)}
.con{max-width:1050px;margin:0 auto;padding:14px}
.s{background:#fff;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden}
.sh{display:flex;align-items:center;padding:10px 16px;cursor:pointer;border-bottom:1px solid #e5e7eb;gap:8px;user-select:none}
.sh:hover{background:#f8fafc}
.sh .n{width:24px;height:24px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.sh .t{font-weight:600;font-size:14px;flex:1}
.sh .a{color:#9ca3af;font-size:10px}
.sb{padding:14px}.sb.hidden{display:none}
.sh.collapsed .a{transform:rotate(-90deg)}
.sh.collapsed{border-bottom:none}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
th{background:#f1f5f9;font-weight:600;text-align:left;padding:6px 8px;border:1px solid #e5e7eb}
td{padding:4px 6px;border:1px solid #e5e7eb;vertical-align:top}
td[contenteditable]{min-height:24px;outline:none}
td[contenteditable]:focus{background:#eff6ff;box-shadow:inset 0 0 0 2px #3b82f6}
textarea{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:60px}
textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.info-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.info-row label{font-weight:600;font-size:12px;color:#64748b}
.ar{color:#2563eb;cursor:pointer;font-size:11px;margin-top:4px;display:inline-block}
.dr{color:#dc2626;cursor:pointer;font-size:11px;margin-left:6px}
.toast{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:6px;color:#fff;font-size:13px;z-index:99}
.ts-ok{background:#16a34a}.ts-err{background:#dc2626}.ts-info{background:#2563eb}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;margin-left:6px}
.b-ok{background:#dcfce7;color:#166534}.b-loc{background:#e5e7eb;color:#6b7280}
</style></head>
<body>
<div class="hd">
<div><h1>📊 质量管理周报</h1><span class="badge b-loc" id="syncBadge">💻 本地</span></div>
<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
<select id="weekSelect" style="min-width:170px"></select>
<button class="btn bo" id="tokenBtn" title="配置GitHub Token">🔑</button>
<button class="btn bo" id="downloadBtn">📥 下载</button>
<button class="btn bo" id="uploadBtn">📤 上传</button>
<button class="btn bo" id="exportBtn">📋 导出Excel</button>
</div></div>
<div class="con" id="mainContent">加载中...</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
const GH_API='https://api.github.com/repos/xwzslqz-afk/quality-weekly/contents/data.json';
const SK='qw_data';
let _sha=null,_D={},_curWeek='';

function tk(){return localStorage.getItem('gh_token')||''}
function sv(){try{localStorage.setItem(SK,JSON.stringify(_D))}catch(e){}}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function ts(m,t){const e=document.createElement('div');e.className='toast ts-'+t;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}
function bd(i,t){const e=document.getElementById('syncBadge');e.textContent=i+' '+t;e.className='badge '+(i==='✅'?'b-ok':'b-loc')}

async function pull(){
 const t=tk();if(!t){bd('💻','本地');return}
 try{const r=await fetch(GH_API,{headers:{'Authorization':'Bearer '+t}});
  if(r.ok){const ci=await r.json();_sha=ci.sha;_D=JSON.parse(atob(ci.content));bd('✅','已同步');return _D}
 }catch(e){}
 bd('💻','本地');return null;
}

async function push(){
 const t=tk();if(!t){ts('请先配置Token','err');return}
 bd('⏳','推送中');
 try{const b={message:'Update',content:btoa(unescape(encodeURIComponent(JSON.stringify(_D,null,2))))};
  if(_sha)b.sha=_sha;
  const r=await fetch(GH_API,{method:'PUT',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(b)});
  if(r.ok){_sha=(await r.json()).content.sha;sv();bd('✅','已同步');ts('已推送','ok')}
  else if(r.status===409)ts('冲突！请先下载再上传','err');else ts('推送失败','err');
 }catch(e){ts('网络错误','err')}
}

function defWk(){return{department:'质量部',period:'',author:'',status:'正常',overview:'',indicators:[],events:[],risks:[],improvements:[],capability:[],decisions:[],nextFocus:''}}

function getWk(){
 const n=new Date(),d=new Date(n.getFullYear(),0,1);
 const w=Math.ceil(((n-d)/86400000+d.getDay()+1)/7);
 return n.getFullYear()+'-W'+String(w).padStart(2,'0');
}

function wkToPeriod(k){
 const [y,wn]=k.split('-W').map(Number);
 const m=new Date(y,0,1+(wn-1)*7-new Date(y,0,1).getDay()+1);
 const s=new Date(m.getTime()+6*86400000);
 const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
 return fmt(m)+' - '+fmt(s);
}

function wkToPeriod(k){
 const [y,wn]=k.split('-W').map(Number);
 const m=new Date(y,0,1+(wn-1)*7-new Date(y,0,1).getDay()+1);
 const s=new Date(m.getTime()+6*86400000);
 const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
 return fmt(m)+' - '+fmt(s);
}

function wkLabel(k){
 const [y,wn]=k.split('-W').map(Number);
 const m=new Date(y,0,1+(wn-1)*7-new Date(y,0,1).getDay()+1);
 const s=new Date(m.getTime()+6*86400000);
 return k+' ('+[m.getFullYear(),String(m.getMonth()+1).padStart(2,'0'),String(m.getDate()).padStart(2,'0')].join('/')+' - '+[s.getFullYear(),String(s.getMonth()+1).padStart(2,'0'),String(s.getDate()).padStart(2,'0')].join('/')+')';
}

function renderWeekSelect(){
 const s=document.getElementById('weekSelect');s.innerHTML='';
 const start=new Date(2026,2,30);
 for(let i=0;i<=260;i++){
  const dt=new Date(start.getTime()+i*7*86400000);
  const y=dt.getFullYear();
  const jan1=new Date(y,0,1);
  const days=Math.floor((dt-jan1)/86400000);
  const wk=Math.ceil((days+jan1.getDay()+1)/7);
  const key=y+'-W'+String(wk).padStart(2,'0');
  const opt=document.createElement('option');
  opt.value=key;opt.textContent=wkLabel(key);
  if(i===0)opt.selected=true;
  s.appendChild(opt);
 }
 _curWeek=s.value;if(!_D[_curWeek])_D[_curWeek]=defWk();if(!_D[_curWeek].period)_D[_curWeek].period=wkToPeriod(_curWeek);
}

function sec(title,num,body,collapsed){
 return'<div class="s"><div class="sh'+(collapsed?' collapsed':'')+'" data-n="'+num+'"><span class="n">'+num+'</span><span class="t">'+title+'</span><span class="a">▼</span></div><div class="sb'+(collapsed?' hidden':'')+'">'+body+'</div></div>';
}

function tbl(arr,headers,fields,selects){
 if(!_D[_curWeek][arr])_D[_curWeek][arr]=[];
 const data=_D[_curWeek][arr];
 let h='<table><thead><tr>';
 headers.forEach(x=>h+='<th>'+x+'</th>');
 h+='<th style="width:30px;text-align:center">✕</th></tr></thead><tbody>';
 data.forEach((row,ri)=>{
  h+='<tr>';
  fields.forEach((f,ci)=>{
   if(selects[ci]){
    h+='<td><select style="width:100%;border:none;font-size:12px" onchange="_D[_curWeek].'+arr+'['+ri+'].'+f+'=this.value;sv()">';
    selects[ci].forEach(o=>h+='<option'+(row[f]===o?' selected':'')+'>'+o+'</option>');
    h+='</select></td>';
   }else{
    h+='<td contenteditable oninput="_D[_curWeek].'+arr+'['+ri+'].'+f+'=this.textContent;sv()">'+es(row[f]||'')+'</td>';
   }
  });
  h+='<td style="text-align:center"><span class="dr" onclick="delRow(\''+arr+'\','+ri+')">✕</span></td></tr>';
 });
 h+='</tbody></table><span class="ar" onclick="addRow(\''+arr+'\')">＋ 添加一行</span>';
 return h;
}

function addRow(arr){
 if(!_D[_curWeek][arr])_D[_curWeek][arr]=[];
 const r={};if(arr==='indicators')r.name=r.thisWeek=r.lastWeek=r.target=r.note='',r.trend='→',r.status2='正常';
 else if(arr==='events')r.name=r.time=r.scope=r.cause=r.action=r.plan='',r.status='处理中';
 else if(arr==='risks')r.item=r.cause=r.impact=r.action=r.deadline='',r.level='🟡中';
 else if(arr==='improvements')r.item=r.progress=r.owner='',r.delayed='否',r.impact='',r.risk='无';
 else if(arr==='capability')r.item=r.bg=r.blocker=r.decision='',r.urgency='普通';
 else r.item=r.bg=r.blocker=r.decision='',r.urgency='普通';
 _D[_curWeek][arr].push(r);sv();render();
}
function delRow(arr,ri){_D[_curWeek][arr].splice(ri,1);sv();render()}

function render(){
 const wk=_curWeek,d=_D[wk]||defWk();
 if(!_D[wk])_D[wk]=d;
 let h='';

 // 头部
 h+='<div class="s"><div class="sb"><div class="info-row">';
 h+='<label>填报部门：</label><input value="'+es(d.department)+'" onchange="_D[\''+wk+'\'].department=this.value;sv()" style="width:80px">';
 h+='<label>周期：</label><input value="'+es(d.period||wkToPeriod(wk))+'" onchange="_D[\''+wk+'\'].period=this.value;sv()" style="width:190px" placeholder="2026-07-20 - 2026-07-26">';
 h+='<label>填报人：</label><input value="'+es(d.author)+'" onchange="_D[\''+wk+'\'].author=this.value;sv()" style="width:80px">';
 h+='<label>状态：</label><select onchange="_D[\''+wk+'\'].status=this.value;sv()">';
 ['正常','关注','异常'].forEach(s=>h+='<option'+(d.status===s?' selected':'')+'>'+s+'</option>');
 h+='</select></div></div></div>';

 // 一
 h+=sec('一、本周质量总览',1,'<textarea onchange="_D[\''+wk+'\'].overview=this.value;sv()" placeholder="3-5句话：总体状态 / 关键变化点 / 最大风险点 / 是否需要领导关注">'+es(d.overview||'')+'</textarea>',!!d._c1);

 // 二
 h+=sec('二、本周最重要的质量指标',2,
  tbl('indicators',['指标','本周值','上周值','目标值/警戒线','趋势','状态','说明'],['name','thisWeek','lastWeek','target','trend','status2','note'],[null,null,null,null,['↑','→','↓'],['正常','关注','异常'],null]),!!d._c2);

 // 三
 h+=sec('三、本周重大质量事件',3,
  tbl('events',['事件名称','发生时间','影响范围','当前状态','原因','已采取措施','后续计划/需要支持'],['name','time','scope','status','cause','action','plan'],[null,null,null,['处理中','已闭环','升级'],null,null,null]),!!d._c3);

 // 四
 h+=sec('四、本周风险预警',4,
  tbl('risks',['风险事项','风险等级','触发原因','可能影响','当前应对','需关注时间点'],['item','level','cause','impact','action','deadline'],[null,['🔴高','🟡中','🟢低'],null,null,null,null]),!!d._c4);

 // 五
 h+=sec('五、本周改进推进情况',5,
  tbl('improvements',['事项','当前进展/结果','是否延期','责任人/时间','影响判断','风险'],['item','progress','delayed','owner','impact','risk'],[null,null,['否','是'],null,null,['无','低','中','高']]),!!d._c5);

 // 六
 h+=sec('六、质量能力建设情况',6,
  tbl('capability',['事项','背景','当前卡点','建议决策','紧急程度'],['item','bg','blocker','decision','urgency'],[null,null,null,null,['普通','紧急']]),!!d._c6);

 // 七
 h+=sec('七、需要决策/协调的事项',7,
  tbl('decisions',['事项','背景','当前卡点','建议决策','紧急程度'],['item','bg','blocker','decision','urgency'],[null,null,null,null,['普通','紧急']]),!!d._c7);

 // 八
 h+=sec('八、下周关注重点',8,'<textarea onchange="_D[\''+wk+'\'].nextFocus=this.value;sv()" placeholder="列出3-5条下周最需要盯住的具体事项">'+es(d.nextFocus||'')+'</textarea>',!!d._c8);

 document.getElementById('mainContent').innerHTML=h;
 if(d._c99)renderWeekSelect();
}

async function init(){
 const l=localStorage.getItem(SK);if(l){try{_D=JSON.parse(l)}catch(e){}}
 await pull();sv();
 renderWeekSelect();
 render();

 document.getElementById('weekSelect').addEventListener('change',function(){
  _curWeek=this.value;if(!_D[_curWeek])_D[_curWeek]=defWk();if(!_D[_curWeek].period)_D[_curWeek].period=wkToPeriod(_curWeek);if(!_D[_curWeek].period)_D[_curWeek].period=wkToPeriod(_curWeek);
  sv();render();
 });
 document.getElementById('downloadBtn').onclick=async()=>{await pull();sv();_curWeek=document.getElementById('weekSelect').value;render();ts('已下载最新数据','ok')};
 document.getElementById('uploadBtn').onclick=push;
 document.getElementById('tokenBtn').onclick=()=>{const t=prompt('GitHub Token (repo权限):',tk());if(t){localStorage.setItem('gh_token',t.trim());ts('Token已保存','ok')}};
 document.getElementById('exportBtn').onclick=()=>{
  const d=_D[_curWeek]||defWk();
  const rs=[['质量管理周报'],[],['部门',d.department,'周期',d.period,'填报人',d.author,'状态',d.status],[],
   ['一、本周质量总览'],[d.overview||''],[],
   ['二、本周最重要的质量指标'],['指标','本周值','上周值','目标值','趋势','状态','说明'],...(d.indicators||[]).map(r=>[r.name,r.thisWeek,r.lastWeek,r.target,r.trend,r.status2,r.note]),[],
   ['三、本周重大质量事件'],['事件名称','发生时间','影响范围','当前状态','原因','已采取措施','后续计划'],...(d.events||[]).map(r=>[r.name,r.time,r.scope,r.status,r.cause,r.action,r.plan]),[],
   ['四、本周风险预警'],['风险事项','风险等级','触发原因','可能影响','当前应对','需关注时间点'],...(d.risks||[]).map(r=>[r.item,r.level,r.cause,r.impact,r.action,r.deadline]),[],
   ['五、本周改进推进情况'],['事项','当前进展','是否延期','责任人/时间','影响判断','风险'],...(d.improvements||[]).map(r=>[r.item,r.progress,r.delayed,r.owner,r.impact,r.risk]),[],
   ['六、质量能力建设情况'],['事项','背景','当前卡点','建议决策','紧急程度'],...(d.capability||[]).map(r=>[r.item,r.bg,r.blocker,r.decision,r.urgency]),[],
   ['七、需要决策/协调的事项'],['事项','背景','当前卡点','建议决策','紧急程度'],...(d.decisions||[]).map(r=>[r.item,r.bg,r.blocker,r.decision,r.urgency]),[],
   ['八、下周关注重点'],[d.nextFocus||'']];
  const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(rs);
  ws['!cols']=[{wch:18},{wch:14},{wch:14},{wch:18},{wch:10},{wch:10},{wch:28}];
  XLSX.utils.book_append_sheet(wb,ws,'周报');XLSX.writeFile(wb,'质量管理周报_'+_curWeek+'.xlsx');
 };
}
init();
</script></body></html>
